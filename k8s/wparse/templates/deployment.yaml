apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wparse.fullname" . }}
  labels:
    {{- include "wparse.labels" . | nindent 4 }}
spec:
  {{- if not .Values.wparse.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "wparse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or (include "wparse.hasWarpParseSecret" .) .Values.wparse.podAnnotations }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and (not .Values.wparse.warpParseSecret.existingSecret) (include "wparse.hasBundledWarpParseToken" .) }}
        checksum/warp-parse-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.wparse.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "wparse.labels" . | nindent 8 }}
        {{- with .Values.wparse.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wparse.serviceAccountName" . }}
      {{- with .Values.wparse.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-config
          image: "{{ .Values.wparse.initImage.repository }}:{{ .Values.wparse.initImage.tag }}"
          imagePullPolicy: {{ .Values.wparse.initImage.pullPolicy }}
          command:
            - sh
            - -c
            - cp -a /config-src/. {{ .Values.wparse.workDir }}/ && mkdir -p {{ .Values.wparse.workDir }}/data/rescue {{ .Values.wparse.workDir }}/data/logs {{ .Values.wparse.workDir }}/data/out_dat {{ .Values.wparse.workDir }}/.run
          volumeMounts:
            - name: config-source
              mountPath: /config-src
              readOnly: true
            - name: config
              mountPath: {{ .Values.wparse.workDir }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.wparse.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.wparse.image.repository }}:{{ .Values.wparse.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.wparse.image.pullPolicy }}
          {{- with .Values.wparse.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.wparse.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.wparse.timezone.enabled .Values.wparse.env }}
          env:
            {{- if .Values.wparse.timezone.enabled }}
            - name: TZ
              value: {{ .Values.wparse.timezone.name | quote }}
            {{- end }}
            {{- with .Values.wparse.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.wparse.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- range .Values.wparse.service.ports }}
            - name: {{ .name }}
              containerPort: {{ .containerPort | default .port }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
            - name: admin
              containerPort: {{ .Values.wparse.adminService.port }}
              protocol: TCP
          {{- with .Values.wparse.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.wparse.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.wparse.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: {{ .Values.wparse.workDir }}
            {{- if include "wparse.hasWarpParseSecret" . }}
            - name: warp-parse-secret
              mountPath: {{ .Values.wparse.warpParseSecretPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.wparse.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config-source
          configMap:
            name: {{ include "wparse.fullname" . }}-config
            items:
              {{- range $path, $_ := .Files.Glob "wparse-config/**" }}
              - key: {{ trimPrefix "wparse-config/" $path | replace "/" "__" }}
                path: {{ trimPrefix "wparse-config/" $path }}
              {{- end }}
        - name: config
          emptyDir: {}
        {{- if include "wparse.hasWarpParseSecret" . }}
        - name: warp-parse-secret
          secret:
            secretName: {{ include "wparse.warpParseSecretName" . }}
            defaultMode: 0400
            items:
              - key: admin_api.token
                path: admin_api.token
              {{- if include "wparse.hasBundledWarpParseTls" . }}
              - key: tls.crt
                path: tls/server.crt
              - key: tls.key
                path: tls/server.key
              {{- end }}
        {{- end }}
      {{- with .Values.wparse.volumes }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.wparse.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.wparse.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.wparse.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
