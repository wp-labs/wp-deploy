apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "station.giteaName" . }}
  labels:
    {{- include "station.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "station.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gitea
  template:
    metadata:
      {{- with .Values.gitea.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "station.labels" . | nindent 8 }}
        app.kubernetes.io/component: gitea
        {{- with .Values.gitea.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.gitea.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gitea
          {{- with .Values.gitea.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.gitea.image.repository }}:{{ .Values.gitea.image.tag }}"
          imagePullPolicy: {{ .Values.gitea.image.pullPolicy }}
          env:
            - name: USER_UID
              value: {{ .Values.gitea.userUid | quote }}
            - name: USER_GID
              value: {{ .Values.gitea.userGid | quote }}
            - name: GITEA__database__DB_TYPE
              value: postgres
            - name: GITEA__database__HOST
              value: {{ printf "%s:%v" (include "station.postgresName" .) .Values.postgres.service.port | quote }}
            - name: GITEA__database__NAME
              value: {{ .Values.postgres.databases.gitea | quote }}
            - name: GITEA__database__USER
              value: {{ .Values.postgres.user | quote }}
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "station.secretName" . }}
                  key: postgres-password
            - name: GITEA__database__SSL_MODE
              value: disable
            - name: GITEA__server__DOMAIN
              value: {{ .Values.gitea.domain | quote }}
            - name: GITEA__server__ROOT_URL
              value: {{ .Values.gitea.rootUrl | quote }}
            - name: GITEA__server__HTTP_PORT
              value: {{ .Values.gitea.service.httpPort | quote }}
            - name: GITEA__server__SSH_DOMAIN
              value: {{ .Values.gitea.sshDomain | quote }}
            - name: GITEA__server__SSH_PORT
              value: {{ .Values.gitea.sshExternalPort | quote }}
            - name: GITEA__server__DISABLE_SSH
              value: "false"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
          ports:
            - name: http
              containerPort: {{ .Values.gitea.service.httpPort }}
              protocol: TCP
            - name: ssh
              containerPort: 22
              protocol: TCP
          {{- with .Values.gitea.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- else }}
          readinessProbe:
            httpGet:
              path: /
              port: http
          {{- end }}
          {{- with .Values.gitea.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- else }}
          livenessProbe:
            httpGet:
              path: /
              port: http
          {{- end }}
          {{- with .Values.gitea.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: gitea-data
              mountPath: /data
            {{- with .Values.gitea.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: {{ include "station.giteaPvcName" . }}
        {{- with .Values.gitea.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.gitea.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gitea.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gitea.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
