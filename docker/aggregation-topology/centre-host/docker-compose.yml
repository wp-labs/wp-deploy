  warp-station:
    image: ghcr.io/wp-labs/wp-station:0.1.6-alpha
    container_name: warp-station
    user: "0:0"
    depends_on:
      warp-toolchain:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      # postgres-init:
      #   condition: service_completed_successfully
      gitea:
        condition: service_healthy
      gitea-init:
        condition: service_completed_successfully
    volumes:
      - ./station/config/config.toml:/app/config/config.toml
      - ./station/default_configs:/app/default_configs
      # wparse相关密钥文件
      - ./station/.warp_parse:/root/.warp_parse
      - warp-toolchain-data:/app/toolchain:ro
    environment:
      # 使用环境变量覆盖容器内 config.toml 的数据库连接配置
      - WP_STATION__DATABASE__HOST=postgres
      - WP_STATION__DATABASE__PORT=5432
      - WP_STATION__DATABASE__NAME=wp-station
      - WP_STATION__DATABASE__USERNAME=${POSTGRES_USER}
      - WP_STATION__DATABASE__PASSWORD=${POSTGRES_PASSWORD}
      # wp-station 从容器网络访问 Gitea 的地址，默认应使用服务名 gitea
      - WP_STATION__GITEA__BASE_URL=http://gitea:3000
      - WP_STATION__GITEA__USERNAME=${GITEA_ADMIN_USERNAME}
      - WP_STATION__GITEA__PASSWORD=${GITEA_ADMIN_PASSWORD}
      # 其余外部依赖地址通过环境变量覆盖 config.toml
      - WP_STATION__ASSIST__BASE_URL=${STATION_AI_BASE_URL}
      - WP_STATION__FEATURES__DATA_COLLECT_URL=${WP_MONITOR_URL}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        git config --global user.name "WarpStation"
        git config --global user.email "station@warpparse.local"
        exec /app/wp-station
    ports:
      - "8081:8081"
    restart: unless-stopped
    ulimits:
      nproc: 4096
    security_opt:
      - seccomp=unconfined


  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.133.0
    ports:
      - "18428:8428"
    volumes:
      # 数据存储目录，按需开启
      - metrics_data:/storage
    command:
      - --envflag.enable
      - --envflag.prefix=VM_
      - --loggerFormat=json
      - --retentionPeriod=${RETENTION_PERIOD}
      - --storageDataPath=/storage
      - "-search.latencyOffset=0s"
    environment:
      - TZ=Asia/Shanghai
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8428/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.43.0
    ports:
      - "19428:9428"
    # 数据存储目录,按需开启
    volumes:
      - logs_data:/storage
    command:
      - --envflag.enable
      - --envflag.prefix=VLOGS_
      - --http.shutdownDelay=15s
      - --httpListenAddr=:9428
      - --loggerFormat=json
      - --retentionPeriod=${RETENTION_PERIOD}
      - --storageDataPath=/storage
      - --retention.maxDiskSpaceUsageBytes=${VLOG_MAX_DISK_SPACE_USAGE_BYTES}
    environment:
      - TZ=Asia/Shanghai
    # 添加健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9428/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  wp-monitor:
    image: ghcr.io/wp-labs/wp-monitor:0.7.2-alpha
    restart: unless-stopped
    ports:
      - "18080:18080"
    environment:
      APP_CONFIG_PATH: /app/config/app.toml
    volumes:
      - ./wp-monitor/config:/app/config:ro


volumes:
  warp-toolchain-data:
  postgres-data:
  gitea-data:
  logs_data:
  metrics_data:
