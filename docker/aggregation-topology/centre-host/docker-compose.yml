services:
  warp-parse:
    user: "root"
    image: ghcr.io/wp-labs/warp-parse:0.23.0-alpha
    container_name: warp-parse
    restart: unless-stopped
    ports:
      - "19002:19002"
      - "19090:19090"
    volumes:
      - ./wparse:/app/config
      - ./wparse/.warp_parse:/root/.warp_parse
    # entrypoint: ["/bin/sh", "/data/wparse-start.sh"]
    entrypoint: ["wparse", "deamon", "--work-root", "/app/config"]

  warp-toolchain:
    image: ghcr.io/wp-labs/warp-parse:0.23.0-alpha
    container_name: warp-toolchain
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /data
        cp -f /usr/local/bin/wparse /data/wparse && chmod +x /data/wparse
        cp -f /usr/local/bin/wpgen /data/wpgen && chmod +x /data/wpgen
        cp -f /usr/local/bin/wproj /data/wproj && chmod +x /data/wproj
        echo "warp 工具链已复制到 /data"
    volumes:
      - warp-toolchain-data:/data
    restart: "no"
  # 此pg不开端口，仅供内部使用
  postgres:
    image: postgres:18.3
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
      - GITEA__database__SSL_MODE=disable
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:3000
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_DOMAIN=localhost
      - GITEA__server__SSH_PORT=222
      - GITEA__server__DISABLE_SSH=false
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=true
    volumes:
      - gitea-data:/data
    ports:
      - "3000:3000"
      - "222:22"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  gitea-init:
    image: gitea/gitea:latest
    container_name: gitea-init
    depends_on:
      gitea:
        condition: service_healthy
    volumes:
      - gitea-data:/data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        su-exec git gitea admin user create \
          --config /data/gitea/conf/app.ini \
          --username ${GITEA_ADMIN_USERNAME} \
          --password ${GITEA_ADMIN_PASSWORD} \
          --email gitea@localhost \
          --admin \
          --must-change-password=false || true
    restart: "no"

